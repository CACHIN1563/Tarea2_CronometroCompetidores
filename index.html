<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro de Competencia - Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header>
            <h1>Competitor <span class="accent">Timer</span></h1>
            <p>Análisis de Sistemas - Tarea 2</p>
        </header>

        <section class="stopwatch-card">
            <div class="timer-display" id="display">00:00:00.<span class="ms">00</span></div>
            
            <div class="controls">
                <button id="startStopBtn" class="btn btn-primary">Iniciar</button>
                <button id="captureBtn" class="btn btn-secondary" disabled>Capturar</button>
                <button id="resetBtn" class="btn btn-outline">Reiniciar</button>
            </div>
        </section>

        <section class="results-section">
            <h2>Resultados de Competidores</h2>
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Competidor</th>
                            <th>Tiempo</th>
                            <th>Diferencia (GAP)</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Entries will be added here via JS -->
                    </tbody>
                </table>
                <div id="noResults" class="empty-state">
                    No hay tiempos capturados aún.
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
